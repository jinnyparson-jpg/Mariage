<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compte à rebours</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Josefin+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #ffffff; 
            font-family: 'Josefin Sans', sans-serif; 
            color: #1a1612; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px;
        }

        .label-top { font-size: 11px; letter-spacing: 6px; color: #1a1612; text-transform: uppercase; margin-bottom: 20px; }
        .divider { border-top: 1px solid #bfa36b; width: 250px; margin: 15px auto; position: relative; }
        .dot { position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; background: #bfa36b; border-radius: 50%; }

        .countdown-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin: 30px 0; width: 100%; max-width: 500px; }
        .num { font-size: 48px; font-weight: 300; line-height: 1; margin-bottom: 5px; color: #1a1612; }
        .unit { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #1a1612; }

        .avant { font-size: 16px; color: #1a1612; margin: 20px 0; }
        .names { font-family: 'Great Vibes', cursive; font-size: 52px; color: #bfa36b; margin: 10px 0; }
        .et { font-family: 'Great Vibes', cursive; font-size: 32px; color: #1a1612; margin: 0 10px; }

        .footer-nav { margin-top: 50px; width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .pagination { display: flex; gap: 8px; margin-bottom: 10px; }
        .page-dot { width: 6px; height: 6px; background-color: #dcd6c6; border-radius: 50%; }
        .page-dot.active { width: 22px; background-color: #bfa36b; border-radius: 4px; }
        .nav-buttons { display: flex; gap: 10px; width: 100%; }
        .btn { flex: 1; padding: 15px; text-align: center; text-decoration: none; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; border: 1px solid #1a1612; }
        .btn-prev { color: #1a1612; }
        .btn-next { background: #1a1612; color: #ffffff; }
        .footer-text { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #a69f93; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="label-top" style="margin-top: 30px;">Plus que</div>
    <div class="divider"><div class="dot"></div></div>

    <div class="countdown-grid">
        <div style="text-align:center"><div class="num" id="d">31</div><div class="unit">Jours</div></div>
        <div style="text-align:center"><div class="num" id="h">19</div><div class="unit">Heures</div></div>
        <div style="text-align:center"><div class="num" id="m">34</div><div class="unit">Minutes</div></div>
        <div style="text-align:center"><div class="num" id="s">59</div><div class="unit">Secondes</div></div>
    </div>

    <div class="divider"><div class="dot"></div></div>
    <div class="avant">avant de célébrer</div>
    <div class="names">Tsiry <span class="et">et</span> Jinny</div>

    <div class="footer-nav">
        <div class="pagination">
            <div class="page-dot"></div><div class="page-dot"></div><div class="page-dot"></div><div class="page-dot active"></div><div class="page-dot"></div>
        </div>
        <div class="nav-buttons">
            <a href="page3.html" class="btn btn-prev">Précédent</a>
            <a href="page5.html" class="btn btn-next">Suivant →</a>
        </div>
        <p class="footer-text">Glissez pour continuer</p>
    </div>

    <script>
        const target = new Date("August 21, 2026 10:00:00").getTime();
        function update() {
            const now = new Date().getTime();
            const gap = target - now;
            document.getElementById('d').innerText = Math.floor(gap / (1000 * 60 * 60 * 24));
            document.getElementById('h').innerText = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('m').innerText = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('s').innerText = Math.floor((gap % (1000 * 60)) / 1000);
        }
        setInterval(update, 1000);
    </script>
</body>
</html>
