    <!-- STREAMING_CHUNK:Loading fonts and base styles -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Josefin+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* STREAMING_CHUNK:Defining gold-themed layout */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: radial-gradient(circle at center, #fdfbf7 0%, #f4f0e9 100%); 
            font-family: 'Josefin Sans', sans-serif; 
            color: #1a1612; 
            display: flex; 
            flex-direction: column;

        .divider-dot { position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 6px; height: 6px; background: #bfa36b; border-radius: 50%; }

        .countdown-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; margin: 40px 0; width: 100%; max-width: 600px; padding: 0 20px; }
        .time-item { display: flex; flex-direction: column; align-items: center; }
        .num { font-size: 56px; font-weight: 300; line-height: 1; margin-bottom: 10px; }
        .unit { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #bfa36b; }

        .celebrer-text { font-family: 'Great Vibes', cursive; font-size: 24px; color: #5a5650; font-style: italic; margin: 20px 0; }

        .ampersand { font-family: 'Great Vibes', cursive; color: #bfa36b; margin: 0 10px; }

        <div class="time-item"><span class="num" id="m">00</span><span class="unit">Minutes</span></div>
        <div class="time-item"><span class="num" id="s">00</span><span class="unit">Secondes</span></div>

    <div class="divider-line"><div class="divider-dot"></div></div>

    <div class="celebrer-text">avant de célébrer</div>

    <!-- STREAMING_CHUNK:Initializing countdown logic -->
    <script>
        const target = new Date("August 21, 2026 10:00:00").getTime();
        function calc() {
            const now = new Date().getTime();
            const gap = target - now;
            document.getElementById('d').innerText = Math.floor(gap / (1000 * 60 * 60 * 24));
            document.getElementById('h').innerText = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('m').innerText = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('s').innerText = Math.floor((gap % (1000 * 60)) / 1000);
        }
        setInterval(calc, 1000);
        calc();
    </script>
