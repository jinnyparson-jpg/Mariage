<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nos Souvenirs</title>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #ffffff; 
            font-family: 'Josefin Sans', sans-serif; 
            color: #1a1612; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 40px 20px;
        }

        .star-icon { color: #bfa36b; font-size: 20px; margin-bottom: 10px; }
        .title { font-size: 11px; letter-spacing: 6px; color: #1a1612; text-transform: uppercase; margin-bottom: 20px; }
        .divider { border-top: 1px solid #bfa36b; width: 250px; margin: 15px auto; position: relative; }
        .dot { position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; background: #bfa36b; border-radius: 50%; }

        .gallery-container { 
            width: 100%; 
            max-width: 900px; 
            margin: 40px 0; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
        }
        .photo-box { 
            width: 100%; 
            aspect-ratio: 3/4; 
            background: #fcfaf8; 
            border: 1px solid #e5e5e5; 
            transition: transform 0.3s ease;
        }
        .photo-box:hover { border-color: #bfa36b; }

        .footer-nav { margin-top: 40px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .nav-buttons { display: flex; gap: 10px; }
        .btn { padding: 15px 30px; border: 1px solid #1a1612; text-decoration: none; color: #1a1612; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; transition: background 0.3s; }
        .btn:hover { background: #f4f4f4; }
        .btn-next { background: #1a1612; color: #ffffff; }
        .btn-next:hover { background: #333; }
        .hint { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #a69f93; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="star-icon">✦</div>
    <div class="title">Nos Souvenirs</div>
    <div class="divider"><div class="dot"></div></div>

    <div class="gallery-container">
        <div class="photo-box"></div>
        <div class="photo-box"></div>
        <div class="photo-box"></div>
        <div class="photo-box"></div>
        <div class="photo-box"></div>
        <div class="photo-box"></div>
        <div class="photo-box"></div>
        <div class="photo-box"></div>
    </div>

    <div class="footer-nav">
        <div class="nav-buttons">
            <a href="page5.html" class="btn">← Précédent</a>
            <a href="page7.html" class="btn btn-next">Suivant →</a>
        </div>
        <p class="hint">Glissez pour continuer</p>
    </div>

</body>
</html>
